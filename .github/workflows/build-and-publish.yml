name: Build Go Binary & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux (amd64)
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../dist/crawler-linux-amd64 ./cmd/server

      - name: Build Linux (arm64)
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o ../dist/crawler-linux-arm64 ./cmd/server

      - name: Build macOS (amd64)
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../dist/crawler-darwin-amd64 ./cmd/server

      - name: Build macOS (arm64 / Apple Silicon)
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o ../dist/crawler-darwin-arm64 ./cmd/server

      - name: Build Windows (amd64)
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../dist/crawler-windows-amd64.exe ./cmd/server

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "讯流后端 ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 下载说明
            根据你的 GitHub Actions 运行环境选择对应的二进制：
            - **Linux x86_64** (大多数 GitHub Actions): `crawler-linux-amd64`
            - **Linux ARM64**: `crawler-linux-arm64`
            - **macOS Intel**: `crawler-darwin-amd64`
            - **macOS Apple Silicon**: `crawler-darwin-arm64`
            - **Windows**: `crawler-windows-amd64.exe`
          files: |
            dist/crawler-linux-amd64
            dist/crawler-linux-arm64
            dist/crawler-darwin-amd64
            dist/crawler-darwin-arm64
            dist/crawler-windows-amd64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
