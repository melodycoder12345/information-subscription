appId: com.information-subscription.app
productName: Information Subscription
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: build

files:
  - "dist/**/*"
  - "dist-electron/**/*"
  - "package.json"
  - "!**/*.ts"
  - "!src/**/*.ts"
  - "!node_modules/**/*"

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  publisherName: Information Subscription

mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.utilities

linux:
  target:
    - AppImage
    - deb
  icon: build/icons
  category: Utility
  maintainer: Information Subscription

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: your-username
  repo: information-subscription-dist
